apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-site
spec:
  replicas: 1        # сколько копий
  selector:
    matchLabels:
      app: my-site
  template:
    metadata:
      labels:
        app: my-site
    spec:
      containers:
      - name: my-site
        image: myfirstexp
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-site
spec:
  type: NodePort
  selector:
    app: my-site
  ports:
  - port: 80
    nodePort: 30080
